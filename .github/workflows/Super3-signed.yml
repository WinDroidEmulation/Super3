name: Super3 APK (Signed)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK + NDK + Build Tools + CMake
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.1.0" \
            "ndk;29.0.14206865" \
            "cmake;3.30.3"

      - name: Get versionName (from android/app/build.gradle.kts)
        id: version
        run: |
          VERSION_NAME=$(grep -m1 'versionName[[:space:]]*=' android/app/build.gradle.kts \
            | sed -n 's/.*versionName[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p')

          if [ -z "$VERSION_NAME" ]; then
            echo "❌ Could not detect versionName from android/app/build.gradle.kts"
            exit 1
          fi

          TAG="v$VERSION_NAME"
          echo "VERSION=$VERSION_NAME" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "✅ Detected versionName: $VERSION_NAME"
          echo "✅ Release tag: $TAG"

      - name: Fail if tag already exists
        run: |
          git fetch --tags
          if git rev-parse "${{ env.TAG }}" >/dev/null 2>&1; then
            echo "❌ Tag already exists: ${{ env.TAG }} (bump versionName in build.gradle.kts)"
            exit 1
          fi

      - name: Decode keystore (Environment secret)
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > release.keystore
          test -s release.keystore

      - name: Build Release AAB
        run: |
          cd android
          chmod +x gradlew
          sed -i 's/^DEFAULT_JVM_OPTS=.*/DEFAULT_JVM_OPTS=""/' gradlew || true
          sed -i 's/\r$//' gradlew || true

          unset _JAVA_OPTIONS
          unset JAVA_TOOL_OPTIONS
          unset JAVA_OPTS

          # Force Kotlin compile target to 21 (safety)
          cat > init.gradle <<'EOF'
          gradle.projectsEvaluated {
            allprojects { p ->
              p.tasks.matching { it.class.name == "org.jetbrains.kotlin.gradle.tasks.KotlinCompile" }.all { t ->
                try { t.kotlinOptions.jvmTarget = "21" } catch (ignored) { }
              }
            }
          }
          EOF

          ./gradlew -I init.gradle bundleRelease --no-daemon

      - name: Locate AAB + Rename
        id: aab
        run: |
          AAB_PATH=$(find android -type f -path "*outputs/bundle/*release*.aab" | head -n 1)
          if [ -z "$AAB_PATH" ]; then
            echo "❌ No .aab found."
            exit 1
          fi
          echo "✅ Found AAB: $AAB_PATH"
          cp "$AAB_PATH" "Super3-${{ env.TAG }}.aab"
          echo "AAB=$AAB_PATH" >> $GITHUB_ENV
          echo "aab=$AAB_PATH" >> $GITHUB_OUTPUT

      - name: Download bundletool
        run: |
          curl -L -o bundletool.jar \
            https://github.com/google/bundletool/releases/download/1.15.6/bundletool-all-1.15.6.jar
          java -jar bundletool.jar version

      - name: Generate SIGNED Universal APK (AAB → APK)
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          java -jar bundletool.jar build-apks \
            --bundle="${{ env.AAB }}" \
            --output=app.apks \
            --mode=universal \
            --ks=release.keystore \
            --ks-pass=pass:"$KS_PASS" \
            --ks-key-alias="$KEY_ALIAS" \
            --key-pass=pass:"$KEY_PASS"

          unzip -p app.apks universal.apk > "Super3-${{ env.TAG }}-universal.apk"

          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/36.1.0/apksigner"
          echo "✅ Verifying signature..."
          "$APKSIGNER" verify --verbose "Super3-${{ env.TAG }}-universal.apk"

      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ env.TAG }}"
          git push origin "${{ env.TAG }}"

      - name: Upload to Releases (AAB + Universal APK)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Super3 ${{ env.TAG }}
          files: |
            Super3-${{ env.TAG }}.aab
            Super3-${{ env.TAG }}-universal.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keystore + temp files (always)
        if: always()
        run: |
          echo "🧹 Cleaning sensitive files..."
          shred -u release.keystore 2>/dev/null || rm -f release.keystore
          rm -f bundletool.jar app.apks
          rm -f android/init.gradle
          rm -rf ~/.gradle/caches ~/.gradle/wrapper || true
